# Build QwenPaw multi-arch Docker image and push to DockerHub + Aliyun ACR on release.
# Pre-release: update <version> and pre only.
# Formal release: update <version>, pre and latest.
name: Docker Build (arm64) - Output as artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. v1.2.3 or v1.2.3-beta.1)"
        required: true
        type: string

env:
  IMAGE_NAME: qwenpaw
  # GitHub Actions expression for default: use input version when available, else commit sha
  IMAGE_TAG: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.sha }}
  QWENPAW_DISABLED_CHANNELS: "imessage"

jobs:
  build-and-export:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set version
        id: vars
        run: |
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Build and load
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          docker buildx build --platform linux/arm64 \
            -f deploy/Dockerfile \
            --build-arg QWENPAW_DISABLED_CHANNELS="${QWENPAW_DISABLED_CHANNELS}" \
            -t ${{ env.IMAGE_NAME }}:${VERSION} \
            --load .

      - name: Test docker load
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          echo "Testing docker load..."
          docker save ${{ env.IMAGE_NAME }}:${VERSION} | gzip -9 > ${IMAGE_NAME}-${VERSION}-arm64.tar.gz
          # 测试加载
          docker rmi ${{ env.IMAGE_NAME }}:${VERSION} -f || true
          docker load -i ${IMAGE_NAME}-${VERSION}-arm64.tar.gz
          echo "✅ docker load test passed"

      - name: Full container test (entrypoint + dependencies + startup + port)
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          echo "=== 1. Check entry script exists and is executable"
          docker run --rm ${{ env.IMAGE_NAME }}:${VERSION} ls -la /app/
          if [ $? -ne 0 ]; then
            echo "❌ Entry directory /app/ not found"
            exit 1
          fi
          echo "✅ Entry directory check passed"

          echo "=== 2. Test Python module import (check dependencies)"
          # Check the fixed model_wrapper, class name is TokenRecordingModelWrapper
          docker run --rm ${{ env.IMAGE_NAME }}:${VERSION} python3 -c "
import qwenpaw
print('qwenpaw imported successfully')
from qwenpaw.token_usage.model_wrapper import TokenRecordingModelWrapper
print('✅ TokenRecordingModelWrapper imported successfully (our fix is present)')
# Verify the fix: check that tool_choice == 'auto' is handled
import inspect
source = inspect.getsource(TokenRecordingModelWrapper.__call__)
if 'tool_choice == "auto"' in source and 'tool_choice = None' in source:
    print('✅ vLLM fix (remove tool_choice=auto) confirmed')
else:
    print('❌ vLLM fix not found')
    exit(1)
print('All checks passed')
"
          if [ $? -ne 0 ]; then
            echo "❌ Python import or fix check failed"
            exit 1
          fi
          echo "✅ All Python dependencies + fix check passed"

          echo "=== 3. Test container startup and port"
          # 启动容器，后台运行
          docker run -d --name qwenpaw-test -p 8088:8088 ${{ env.IMAGE_NAME }}:${VERSION}
          # 等待服务启动
          sleep 15
          # 检查容器是否还在运行（没有崩溃退出）
          if ! docker ps | grep -q qwenpaw-test; then
            echo "❌ Container crashed on startup"
            docker logs qwenpaw-test
            docker rm qwenpaw-test -f
            exit 1
          fi
          echo "✅ Container is running"

          # 测试端口响应
          if ! curl --connect-timeout 8 http://localhost:8088/ > /tmp/curl_out.txt 2>&1; then
            echo "❌ Port 8088 not responding"
            docker logs qwenpaw-test
            docker stop qwenpaw-test
            docker rm qwenpaw-test
            exit 1
          fi
          echo "✅ Port 8088 responding successfully"

          echo "=== All tests passed!"
          # 清理
          docker stop qwenpaw-test
          docker rm qwenpaw-test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}-arm64.tar.gz
          path: ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}-arm64.tar.gz
          retention-days: 7
