name: Docker Build (arm64) - Output as artifact
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag"
        required: false
        default: ""
        type: string
env:
  IMAGE_NAME: qwenpaw
  QWENPAW_DISABLED_CHANNELS: "imessage"
jobs:
  build-and-export:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set version
        id: vars
        run: |
          if [ "$VERSION_INPUT" != "" ]; then
            echo "version=$VERSION_INPUT" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_SHA:0:12}" >> $GITHUB_OUTPUT
          fi
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and load
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          docker buildx build --platform linux/arm64 \
            -f deploy/Dockerfile \
            --build-arg QWENPAW_DISABLED_CHANNELS="${QWENPAW_DISABLED_CHANNELS}" \
            -t $IMAGE_NAME:$VERSION \
            --load .
      - name: Test docker load
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          echo "Testing docker load..."
          TAG_SHORT=$VERSION
          docker save $IMAGE_NAME:$VERSION | gzip -9 > ${IMAGE_NAME}-${TAG_SHORT}-arm64.tar.gz
          docker rmi $IMAGE_NAME:$VERSION -f || true
          docker load -i ${IMAGE_NAME}-${TAG_SHORT}-arm64.tar.gz
          echo "✅ docker load test passed"
      - name: Full container test
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          TAG_SHORT=$VERSION
          echo "=== 1. Check entry directory exists"
          docker run --rm $IMAGE_NAME:$TAG_SHORT ls -la /app/
          if [ $? -ne 0 ]; then
            echo "❌ Entry directory /app/ not found"
            exit 1
          fi
          echo "✅ Entry directory check passed"
          echo "=== 2. Test Python module import + verify vLLM fix"
          docker run --rm $IMAGE_NAME:$TAG_SHORT python3 -c "import qwenpaw; print('qwenpaw imported successfully'); from qwenpaw.token_usage.model_wrapper import TokenRecordingModelWrapper; print('✅ TokenRecordingModelWrapper imported'); import inspect; source = inspect.getsource(TokenRecordingModelWrapper.__call__); exit(0 if 'tool_choice == \"auto\"' in source and 'tool_choice = None' in source else 1)"
          if [ $? -ne 0 ]; then
            echo "❌ Python import or fix check failed"
            exit 1
          fi
          echo "✅ All Python checks passed"
          echo "=== 3. Test qwenpaw CLI works"
          docker run --rm $IMAGE_NAME:$TAG_SHORT qwenpaw --help
          if [ $? -ne 0 ]; then
            echo "❌ qwenpaw --help failed"
            exit 1
          fi
          echo "✅ qwenpaw CLI works"
          echo "=== 4. Test qwenpaw init generates config"
          docker run --rm $IMAGE_NAME:$TAG_SHORT sh -c "
            qwenpaw init --defaults --accept-security
            CONFIG_PATH=/app/working/config.json
            if [ ! -f \$CONFIG_PATH ]; then
              echo 'ERROR: config.json not generated at \$CONFIG_PATH' >&2
              ls -la /app/working/
              exit 1
            fi
            if ! grep -q 'port' \$CONFIG_PATH; then
              echo 'ERROR: config.json missing port field' >&2
              cat \$CONFIG_PATH
              exit 1
            fi
            echo 'SUCCESS: config generated at /app/working/config.json'
            exit 0
          "
          if [ $? -ne 0 ]; then
            echo "❌ qwenpaw init failed (config not generated or missing port)"
            exit 1
          fi
          echo "✅ qwenpaw init works (config generated successfully)"
          echo "=== 5. Test container startup and port"
          docker run -d --name qwenpaw-test -p 8088:8088 $IMAGE_NAME:$TAG_SHORT
          sleep 30
          if ! docker ps | grep -q qwenpaw-test; then
            echo "❌ Container crashed"
            docker logs qwenpaw-test
            docker rm qwenpaw-test -f
            exit 1
          fi
          echo "✅ Container running"
          if ! curl --connect-timeout 15 http://localhost:8088/ > /tmp/curl_out.txt 2>&1; then
            echo "❌ Port 8088 not responding"
            docker logs qwenpaw-test
            docker stop qwenpaw-test
            docker rm qwenpaw-test
            exit 1
          fi
          grep -q "<!DOCTYPE html>" /tmp/curl_out.txt
          if [ $? -ne 0 ]; then
            echo "❌ Not valid HTML"
            cat /tmp/curl_out.txt
            docker stop qwenpaw-test
            docker rm qwenpaw-test
            exit 1
          fi
          echo "✅ Port 8088 responding with valid HTML"
          echo "===== 👉 ALL TESTS PASSED! ====="
          echo "✅ Entry directory"
          echo "✅ Python import + vLLM fix"
          echo "✅ qwenpaw CLI"
          echo "✅ qwenpaw init"
          echo "✅ Container running"
          echo "✅ Port 8088"
          docker stop qwenpaw-test
          docker rm qwenpaw-test
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwenpaw-${{ steps.vars.outputs.version }}-arm64.tar.gz
          path: qwenpaw-${{ steps.vars.outputs.version }}-arm64.tar.gz
          retention-days: 7
