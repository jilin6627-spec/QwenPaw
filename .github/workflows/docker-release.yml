name: Docker Build (arm64) - Output as artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag"
        required: false
        default: ""
        type: string

env:
  IMAGE_NAME: qwenpaw
  QWENPAW_DISABLED_CHANNELS: "imessage"

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set version
        id: vars
        run: |
          if [ "$VERSION_INPUT" != "" ]; then
            echo "version=$VERSION_INPUT" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_SHA:0:12}" >> $GITHUB_OUTPUT
          fi
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          docker buildx build --platform linux/arm64 \
            -f deploy/Dockerfile \
            --build-arg QWENPAW_DISABLED_CHANNELS="${QWENPAW_DISABLED_CHANNELS}" \
            -t $IMAGE_NAME:$VERSION \
            --load .

      - name: Test docker load
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          echo "Testing docker load..."
          TAG_SHORT=$VERSION
          docker save $IMAGE_NAME:$VERSION | gzip -9 > ${IMAGE_NAME}-${TAG_SHORT}-arm64.tar.gz
          docker rmi $IMAGE_NAME:$VERSION -f || true
          docker load -i ${IMAGE_NAME}-${TAG_SHORT}-arm64.tar.gz
          echo "✅ docker load test passed"

      - name: Full container test (entrypoint + dependencies + cli + init + startup + port)
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          TAG_SHORT=$VERSION

          echo "=== 1. Check entry directory exists"
          docker run --rm $IMAGE_NAME:$TAG_SHORT ls -la /app/
          if [ $? -ne 0 ]; then
            echo "❌ Entry directory /app/ not found"
            exit 1
          fi
          echo "✅ Entry directory check passed"

          echo "=== 2. Test Python module import + verify vLLM fix"
          docker run --rm $IMAGE_NAME:$TAG_SHORT python3 << 'EOF'
import qwenpaw
print('qwenpaw imported successfully')
from qwenpaw.token_usage.model_wrapper import TokenRecordingModelWrapper
print('✅ TokenRecordingModelWrapper imported successfully (our fix is present)')
import inspect
source = inspect.getsource(TokenRecordingModelWrapper.__call__)
if 'tool_choice == "auto"' in source and 'tool_choice = None' in source:
    print('✅ vLLM fix (remove tool_choice=auto) confirmed')
else:
    print('❌ vLLM fix not found')
    exit(1)
print('All dependency checks passed')
EOF
          if [ $? -ne 0 ]; then
            echo "❌ Python import or fix check failed"
            exit 1
          fi
          echo "✅ All Python dependencies + vLLM fix check passed"

          echo "=== 3. Test qwenpaw CLI works"
          docker run --rm $IMAGE_NAME:$TAG_SHORT qwenpaw --help
          if [ $? -ne 0 ]; then
            echo "❌ qwenpaw --help failed"
            exit 1
          fi
          echo "✅ qwenpaw CLI help works"

          echo "=== 4. Test qwenpaw init (generate config.json)"
          docker run --rm $IMAGE_NAME:$TAG_SHORT sh -c "
mkdir -p /tmp/test-init
cd /tmp/test-init
qwenpaw init --defaults --accept-security
if [ ! -f config.json ]; then
    echo '❌ config.json not generated by qwenpaw init'
    exit 1
fi
echo '✅ config.json generated'
grep -q 'port' config.json
if [ $? -ne 0 ]; then
    echo '❌ config.json missing expected fields'
    exit 1
fi
echo '✅ config.json format correct'
rm -rf /tmp/test-init
"
          if [ $? -ne 0 ]; then
            echo "❌ qwenpaw init test failed"
            exit 1
          fi
          echo "✅ qwenpaw init works correctly"

          echo "=== 5. Test container startup and web port"
          docker run -d --name qwenpaw-test -p 8088:8088 $IMAGE_NAME:$TAG_SHORT
          sleep 30
          if ! docker ps | grep -q qwenpaw-test; then
            echo "❌ Container crashed on startup"
            docker logs qwenpaw-test
            docker rm qwenpaw-test -f
            exit 1
          fi
          echo "✅ Container is running stable"

          if ! curl --connect-timeout 15 http://localhost:8088/ > /tmp/curl_out.txt 2>&1; then
            echo "❌ Port 8088 not responding"
            docker logs qwenpaw-test
            docker stop qwenpaw-test
            docker rm qwenpaw-test
            exit 1
          fi
          grep -q "<!DOCTYPE html>" /tmp/curl_out.txt
          if [ $? -ne 0 ]; then
            echo "❌ Port 8088 response is not valid HTML"
            cat /tmp/curl_out.txt
            docker stop qwenpaw-test
            docker rm qwenpaw-test
            exit 1
          fi
          echo "✅ Port 8088 responding with valid HTML"

          echo "=== 👉 ALL TESTS PASSED!"
          echo "✅ 1. Entry directory OK"
          echo "✅ 2. Python import + vLLM fix OK"
          echo "✅ 3. qwenpaw CLI OK"
          echo "✅ 4. qwenpaw init OK"
          echo "✅ 5. Container running OK"
          echo "✅ 6. Port 8088 OK"
          docker stop qwenpaw-test
          docker rm qwenpaw-test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwenpaw-${{ steps.vars.outputs.version }}-arm64.tar.gz
          path: qwenpaw-${{ steps.vars.outputs.version }}-arm64.tar.gz
          retention-days: 7
